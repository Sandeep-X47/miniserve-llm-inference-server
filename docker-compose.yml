services:
  backend:
    build: ./backend
    environment:
      ENGINE: "mock"            # set to "hf" for a real model (add torch/transformers)
      MAX_BATCH_SIZE: "16"
      BATCH_WAIT_MS: "15"
      QUEUE_CAPACITY: "256"
      BATCHING: "continuous"
      CORS_ORIGINS: "http://localhost:8080"
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
